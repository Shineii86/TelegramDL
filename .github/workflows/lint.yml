name: CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort
          
      - name: Run flake8 (errors only)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          
      - name: Check formatting with black
        run: |
          black --check . || true
          
      - name: Check import order with isort
        run: |
          isort --check-only . || true
          
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit
          
      - name: Run bandit security linter
        run: |
          bandit -r . -ll || true
          
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [lint, security]
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Verify Python syntax
        run: |
          python -m py_compile bot.py || true
          python -m py_compile config.py || true
          python -m py_compile app.py || true
          python -m py_compile gen_session.py || true
          
      - name: Verify plugin syntax
        run: |
          python -m py_compile plugins/start.py || true
          python -m py_compile plugins/generate.py || true
          python -m py_compile plugins/backup.py || true
          python -m py_compile plugins/broadcast.py || true
          python -m py_compile plugins/payment.py || true
          python -m py_compile plugins/logger.py || true
          python -m py_compile plugins/ytdl.py || true
          python -m py_compile plugins/custom_bot.py || true
          python -m py_compile plugins/settings.py || true
          
      - name: Verify utils syntax
        run: |
          python -m py_compile utils/ui.py || true
          python -m py_compile utils/progress.py || true
          python -m py_compile utils/session.py || true
          python -m py_compile utils/keepalive.py || true
          python -m py_compile utils/checkpoint.py || true
          python -m py_compile utils/media.py || true
          python -m py_compile utils/filters.py || true
          python -m py_compile utils/archive.py || true
          python -m py_compile utils/splitter.py || true
          python -m py_compile utils/ytdl.py || true
          python -m py_compile utils/audio_metadata.py || true
          
      - name: Verify database syntax
        run: |
          python -m py_compile database/db.py || true
          
      - name: Build Docker image
        run: |
          docker build -t telegramdl-test . || true
